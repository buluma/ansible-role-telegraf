---
- become: false
  gather_facts: true
  hosts: all
  pre_tasks:
    - ansible.builtin.apt: update_cache=yes cache_valid_time=600
      name: Update apt cache.
      changed_when: false
      when: ansible_os_family == 'Debian'
  roles:
    - role: buluma.telegraf
  tasks:
    - ansible.builtin.dnf:
        name: which
        state: present
      name: Installing packages on CentOS
      when:
        - ansible_os_family == 'RedHat'
    - name: Apt get update
      ansible.builtin.command: apt-get update
      tags:
        - molecule-idempotence-notest
      when:
        - ansible_os_family == 'Debian'
    - name: Installing packages on Debian
      ansible.builtin.apt:
        name:
          - wget
          - "{{ 'gnupg-agent' if ansible_distribution_major_version in ['8', '18', '16'] else 'gpg-agent' }}"
        state: present
        update_cache: true
      when:
        - ansible_os_family == 'Debian'
        - ansible_distribution_major_version not in [9, 10]
    - name: Installing packages on Debian
      ansible.builtin.apt:
        name:
          - wget
          - python-apt
          - "{{ 'gnupg-agent' if ansible_distribution_major_version in ['8', '18', '16'] else 'gpg-agent' }}"
        state: present
        update_cache: true
      when:
        - ansible_os_family == 'Debian'
        - ansible_distribution_major_version in [9, 10]
    - name: Installing packages on Suse
      community.general.zypper:
        name:
          - aaa_base
        state: present
      when:
        - ansible_os_family == 'Suse'
